map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;

    # 根目录设置，对应 Dockerfile 中拷贝的 dist 目录
    root /usr/share/nginx/html;
    index index.html;

    # 静态资源缓存配置
    location ~* \.(?:js|css|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        expires 1y;
    }

    # index.html 配置
    location = /index.html {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # API 代理到后端容器
    location /api/ {
        # 注意：此处 backend 是 docker-compose 中的服务名，8099 是其内部端口
        proxy_pass http://backend:8099/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # WebSocket / chatroom 代理
    location /chatroom/ {
        proxy_pass http://backend:8099/chatroom/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA history 模式的 Fallback，所有其他路径都交由 index.html 处理
    location / {
        try_files $uri $uri/ /index.html;
    }
}